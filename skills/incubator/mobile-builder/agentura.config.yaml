domain:
  name: incubator
  description: "Feature incubation — Lovable prototypes to production code"
  owner: "product-team"

skills:
  - name: mobile-builder
    path: mobile-builder
    role: agent
    model: anthropic/claude-sonnet-4-5-20250929
    cost_budget: "$2.00"
    triggers:
      - type: pipeline
        pattern: "incubator-build step mobile-builder"
      - type: pipeline
        pattern: "incubator-refine step mobile-builder"

agent:
  executor: claude-code
  max_iterations: 60
  timeout: 900

guardrails:
  budget:
    max_per_execution: "$3.00"
    alert_at: "$2.00"

feedback:
  capture_corrections: true
  auto_generate_tests: false
  capture_failure_cases: true

verify:
  enabled: true
  criteria:
    - "Git branch was created and pushed to remote"
    - "PR was created against the target branch"
    - "Feature package created under ui/<feature>/"

display:
  title: "Mobile Builder"
  subtitle: "Android Feature Agent"
  avatar: "MB"
  color: "#7c3aed"
  tags: ["Incubator", "Agent", "Mobile", "Kotlin"]
