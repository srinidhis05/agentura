name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]

jobs:
  # Interactive: respond to @claude mentions in PR/issue comments
  claude-assist:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 15"

  # Issue-to-PR: label an issue with "implement" and Claude builds it
  claude-implement:
    if: |
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'implement')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Implement the feature described in issue #${{ github.event.issue.number }}.
            Read the issue title and body carefully. Follow existing code patterns.
            Create a branch, implement the changes, and open a PR.
          claude_args: "--model claude-sonnet-4-5-20250929 --max-turns 25"
