apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: metabase-mcp
  name: metabase-mcp
  namespace: agentura-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metabase-mcp
  template:
    metadata:
      labels:
        app: metabase-mcp
    spec:
      containers:
        - name: metabase-mcp
          image: 441250065216.dkr.ecr.ap-south-1.amazonaws.com/agentura/metabase-mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8097
          env:
            - name: METABASE_URL
              value: "https://metabase.internal.aspora.com"
          envFrom:
            - secretRef:
                name: agentura-api-keys
                optional: true
            - secretRef:
                name: agentura-mcp-config
                optional: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8097
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: "250m"
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: metabase-mcp
  namespace: agentura-system
spec:
  selector:
    app: metabase-mcp
  ports:
    - port: 8097
      targetPort: 8097
