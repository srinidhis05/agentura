server:
  host: "0.0.0.0"
  port: 3001

database:
  host: ${DB_HOST}
  port: 5432
  user: ${DB_USER}
  password: ${DB_PASSWORD}
  name: ${DB_NAME}
  ssl_mode: disable

auth:
  enabled: false

cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3002"
    - "http://localhost:5173"

rate_limit:
  requests_per_second: 10
  burst: 20

logging:
  level: info
  format: json

metrics:
  enabled: true
  path: /metrics

executor:
  url: "${EXECUTOR_URL}"
  timeout: 1200

execution:
  mode: "${EXECUTION_MODE}"
  docker:
    image: "${SKILL_RUNNER_IMAGE}"
    network: "agentura_default"
    skills_dir: "/skills"
    resource_limits:
      memory: "512m"
      cpus: "1.0"
  kubernetes:
    namespace: "agentura"
    image: "${SKILL_RUNNER_IMAGE}"
    runtime_class: ""
    service_account: "skill-runner"
    resource_limits:
      memory: "512Mi"
      cpu: "1000m"
    timeout: "300s"

triggers:
  enabled: true
  timezone: UTC
  cron:
    enabled: true
    poll_interval: 300
  webhook:
    enabled: true
    secret: "${WEBHOOK_SECRET}"
  github:
    enabled: true
    secret: "${GITHUB_WEBHOOK_SECRET}"
  slack:
    enabled: true
    apps:
      - name: incubator
        signing_secret: "${SLACK_INCUBATOR_SIGNING_SECRET}"
        bot_token: "${SLACK_INCUBATOR_BOT_TOKEN}"
        app_token: "${SLACK_INCUBATOR_APP_TOKEN}"
        mode: "http"
        domain_scope: "incubator"
        allowed_skills: ["*"]
        allowed_pipelines: ["incubator-analyze", "incubator-build", "incubator-refine", "incubator-ship"]
        ack_reaction: "eyes"
        typing_reaction: "hourglass_flowing_sand"
        dm:
          policy: "open"
        events:
          message: true
          app_mention: true
          reaction: true
          member_join: true
          member_leave: false
          channel_rename: true
          pin: true
      - name: ecm
        signing_secret: "${SLACK_ECM_SIGNING_SECRET}"
        bot_token: "${SLACK_ECM_BOT_TOKEN}"
        app_token: "${SLACK_ECM_APP_TOKEN}"
        mode: "socket"
        domain_scope: "ecm"
        allowed_skills: ["*"]
        ack_reaction: "eyes"
        typing_reaction: "hourglass_flowing_sand"
        dm:
          policy: "open"
          allowlist: []
        events:
          message: true
          app_mention: true
          reaction: true
        commands:
          - pattern: "order {order_id}"
            skill: "process-stuck-order"
            description: "Full order diagnosis with runbook steps"
          - pattern: "triage"
            skill: "triage"
            description: "Triage stuck orders, score priority, assign to agents"
          - pattern: "triage last {days} days"
            skill: "triage"
            extract: {"time_range_days": "{days}"}
            description: "Triage with custom time range"
          - pattern: "stuck at {category}"
            skill: "process-stuck-order"
            description: "List orders stuck at a category"
          - pattern: "list {category}"
            skill: "process-stuck-order"
            description: "List orders for a category"
          - pattern: "dashboard"
            skill: "ecm-daily-flow"
            description: "Daily ECM backlog dashboard"
          - pattern: "patterns"
            skill: "pattern-intelligence"
            description: "Analyze recurring stuck patterns"
      - name: pm
        signing_secret: "${SLACK_PM_SIGNING_SECRET}"
        bot_token: "${SLACK_PM_BOT_TOKEN}"
        app_token: "${SLACK_PM_APP_TOKEN}"
        mode: "socket"
        domain_scope: "pm"
        allowed_skills: ["*"]
        ack_reaction: "eyes"
        typing_reaction: "hourglass_flowing_sand"
        dm:
          policy: "open"
        events:
          message: true
          app_mention: true
          reaction: true
        commands:
          - pattern: "update {project} meeting"
            skill: "meeting-update"
            extract: {"project_slug": "{project}"}
            description: "Process meeting notes → Notion + Slack + Email + ClickUp"
          - pattern: "{project} update"
            skill: "meeting-update"
            extract: {"project_slug": "{project}"}
            description: "Process meeting notes for a project"
          - pattern: "setup {project}"
            skill: "project-setup"
            extract: {"project_slug": "{project}"}
            description: "Initialize a new project config"
          - pattern: "daily status"
            skill: "pm-heartbeat"
            description: "Daily project status digest (Granola + ClickUp)"
          - pattern: "pm status"
            skill: "pm-heartbeat"
            description: "Project status overview"
          - pattern: "check {project}"
            skill: "pm-heartbeat"
            extract: {"project_slug": "{project}"}
            description: "Check status for a specific project"
      - name: ge
        signing_secret: "${SLACK_GE_SIGNING_SECRET}"
        bot_token: "${SLACK_GE_BOT_TOKEN}"
        mode: "http"
        domain_scope: "ge"
        allowed_skills: ["*"]
        ack_reaction: "eyes"
        dm:
          policy: "pairing"
        events:
          message: true
          app_mention: true
          reaction: true
